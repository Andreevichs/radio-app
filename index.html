<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- КРИТИЧЕСКИ ВАЖНО: Скрываем referer чтобы станции не блокировали -->
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#121214; --surface:#1c1c1f; --acid:#ccff00; --text-main:#fff; --text-muted:#6e6e76; }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{background:var(--bg);color:var(--text-main);font-family:'Space Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
        
        /* Оверлей для первого запуска (обход блокировки автоплея) */
        .start-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 100;
            display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
            cursor: pointer; transition: opacity 0.5s ease;
        }
        .start-overlay.hidden { opacity: 0; pointer-events: none; }
        .start-text { font-size: 14px; color: var(--acid); letter-spacing: 2px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

        .player{width:90%;max-width:400px;background:var(--surface);border-radius:24px;padding:32px;display:flex;flex-direction:column;gap:32px;border:1px solid rgba(255,255,255,.05);position:relative;z-index:1}
        .equalizer{height:120px;display:flex;align-items:flex-end;justify-content:space-between;gap:4px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.05)}
        .bar{flex:1;background:var(--text-muted);border-radius:2px;min-height:4px;transition:height .05s ease}
        .bar.active{background:var(--acid);box-shadow:0 0 8px rgba(204,255,0,.4)}
        .info-row{display:flex;align-items:center;justify-content:center;gap:12px;text-align:center}
        .list-btn{background:0 0;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;padding:4px 8px}
        .info h1{font-size:20px;letter-spacing:2px;margin-bottom:4px}
        .station-name{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .controls{display:flex;align-items:center;justify-content:center;gap:24px}
        button.nav-btn{background:0 0;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;padding:12px;transition:all .2s}
        button.nav-btn:active{transform:scale(.9)}
        .play-btn{width:64px;height:64px;background:var(--acid);color:var(--bg);border-radius:50%;font-size:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(204,255,0,.3);border:none;cursor:pointer}
        .play-btn:active{box-shadow:0 0 30px rgba(204,255,0,.6);transform:scale(.95)}
        .station-list-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);z-index:10;opacity:0;pointer-events:none;transition:opacity .3s ease;display:flex;align-items:flex-end}
        .station-list-overlay.open{opacity:1;pointer-events:auto}
        .station-list{width:100%;max-height:70vh;background:var(--surface);border-radius:24px 24px 0 0;padding:24px;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.25,.46,.45,.94)}
        .station-list-overlay.open .station-list{transform:translateY(0)}
        .station-item{padding:16px;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;font-size:14px;letter-spacing:1px;color:var(--text-muted);transition:all .2s}
        .station-item:last-child{border-bottom:none}
        .station-item.active{color:var(--acid);padding-left:24px}
        .station-item:active{background:rgba(255,255,255,.03)}
        body[data-theme="light"]{--bg:#f0f0f2;--surface:#fff;--text-main:#121214;--text-muted:#999}
    </style>
</head>
<body>
    <!-- Экран первого запуска -->
    <div class="start-overlay" id="startOverlay">
        <h1 style="color:var(--acid)">RADIO</h1>
        <div class="start-text">НАЖМИ ЧТОБЫ ЗАПУСТИТЬ</div>
    </div>

    <div class="station-list-overlay" id="listOverlay"><div class="station-list" id="stationList"></div></div>

    <div class="player">
        <div class="equalizer" id="eq"></div>
        <div class="info-row">
            <button class="list-btn" id="openListBtn">☰</button>
            <div class="info">
                <h1>RADIO</h1>
                <div class="station-name" id="stationName">ВЫБЕРИ СТАНЦИЮ</div>
            </div>
        </div>
        <div class="controls">
            <button class="nav-btn" id="prevBtn">⏮</button>
            <button class="play-btn" id="playBtn">▶</button>
            <button class="nav-btn" id="nextBtn">⏭</button>
        </div>
    </div>

    <audio id="audio" preload="none"></audio>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        document.body.setAttribute('data-theme', tg.colorScheme);
        tg.onEvent('themeChanged', () => document.body.setAttribute('data-theme', tg.colorScheme));

        // ОБНОВЛЕННЫЙ СПИСОК С ЗЕРКАЛАМИ
        const stations = [
            { name: "RADIO RECORD", url: "https://radiorecord.hostingradio.ru/rr_main96.aacp" },
            { name: "EUROPA PLUS", url: "https://ep256.hostingradio.ru:8043/europaplus256.mp3" },
            { name: "TECHNO LIVE", url: "https://stream.zenolive.com/f3wvbbqmdg8uv" },
            { name: "IBIZA GLOBAL", url: "https://ibizaglobalradio.streaming-pro.com:8024/stream" },
            { name: "РАДИО МИНСК", url: "https://stream.radiominsk.by/radiominsk_128" },
            { name: "TECHNOBASE FM", url: "https://listen.technobase.fm/tunein-aac-hd" },
            { name: "RECORD RUSSIAN", url: "https://radiorecord.hostingradio.ru/russianmix96.aacp" },
            { name: "LOUNGE FM", url: "https://online.loungefm.com.ua/loungefm_aac_64" },
            { name: "НОВОЕ РАДИО BY", url: "https://stream.novoeradio.by/novoeradio_128" },
            { name: "PSYRADIO UK", url: "https://psyradio.uk:8080/stream" }
        ];

        let idx = 0, isPlaying = false, audioUnlocked = false;
        let audioCtx, analyser, source, dataArray;
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const stationName = document.getElementById('stationName');
        const eqContainer = document.getElementById('eq');
        const listOverlay = document.getElementById('listOverlay');
        const stationListEl = document.getElementById('stationList');
        const startOverlay = document.getElementById('startOverlay');

        // Бары эквалайзера
        const BAR_COUNT = 24;
        for(let i=0; i<BAR_COUNT; i++){
            const bar = document.createElement('div');
            bar.className = 'bar';
            eqContainer.appendChild(bar);
        }
        const bars = document.querySelectorAll('.bar');

        // ПЕРВЫЙ ЖЕСТ: Разблокировка аудио
        startOverlay.addEventListener('click', () => {
            audioUnlocked = true;
            startOverlay.classList.add('hidden');
            initAudioContext();
            load(0);
            togglePlay();
            tg.HapticFeedback?.impactOccurred('medium');
        });

        function renderList(){
            stationListEl.innerHTML = '';
            stations.forEach((st, i) => {
                const item = document.createElement('div');
                item.className = `station-item ${i === idx ? 'active' : ''}`;
                item.textContent = st.name;
                item.onclick = () => selectStation(i);
                stationListEl.appendChild(item);
            });
        }

        function selectStation(i){
            idx = i;
            load(idx);
            if(!isPlaying && audioUnlocked) togglePlay();
            closeList();
            renderList();
            tg.HapticFeedback?.selectionChanged();
        }

        function openList(){ renderList(); listOverlay.classList.add('open'); tg.HapticFeedback?.impactOccurred('light'); }
        function closeList(){ listOverlay.classList.remove('open'); }
        listOverlay.addEventListener('click', e => { if(e.target === listOverlay) closeList(); });
        document.getElementById('openListBtn').onclick = openList;

        function initAudioContext(){
            if(audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                analyser.fftSize = 64;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                animateEq();
            } catch(e){ console.warn('AudioContext failed:', e); }
        }

        function animateEq(){
            requestAnimationFrame(animateEq);
            if(!isPlaying) return;
            try {
                analyser.getByteFrequencyData(dataArray);
                bars.forEach((bar, i) => {
                    const value = dataArray[i] || 0;
                    bar.style.height = `${Math.max(4, (value/255)*120)}px`;
                    bar.classList.toggle('active', value > 150);
                });
            } catch(e){
                bars.forEach(bar => {
                    bar.style.height = `${Math.random()*60+10}px`;
                    bar.classList.toggle('active', Math.random()>0.7);
                });
            }
        }

        function load(i){
            audio.src = stations[i].url;
            stationName.textContent = stations[i].name;
        }

        function togglePlay(){
            if(!audioUnlocked) return;
            
            if(audio.paused){
                if(audioCtx?.state === 'suspended') audioCtx.resume();
                audio.play().then(() => {
                    playBtn.textContent = "⏸";
                    isPlaying = true;
                    tg.HapticFeedback?.impactOccurred('medium');
                }).catch(err => {
                    console.error('Play error:', err);
                    stationName.textContent = "ОШИБКА ПОТОКА";
                    tg.HapticFeedback?.notificationOccurred('error');
                });
            } else {
                audio.pause();
                playBtn.textContent = "▶";
                isPlaying = false;
                bars.forEach(b => { b.style.height='4px'; b.classList.remove('active'); });
                tg.HapticFeedback?.impactOccurred('light');
            }
        }

        playBtn.onclick = togglePlay;

        const nav = d => { 
            idx = (idx + d + stations.length) % stations.length; 
            load(idx); 
            if(isPlaying) audio.play().catch(()=>{});
            renderList(); 
            tg.HapticFeedback?.selectionChanged(); 
        };

        document.getElementById('nextBtn').onclick = () => nav(1);
        document.getElementById('prevBtn').onclick = () => nav(-1);

        renderList();
        tg.ready();
    </script>
</body>
</html>
